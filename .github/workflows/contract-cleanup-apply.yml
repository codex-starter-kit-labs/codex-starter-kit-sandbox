name: Apply contract sandbox cleanup under mandate

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: starter-kit-contract-sandbox
  cancel-in-progress: false

jobs:
  rules:
    uses: ./.github/workflows/contract-apply-role.yml
    secrets: inherit
    with:
      stage: cleanup
      role: rules
      planning_run_id: "PENDING"
      artifact_name: issue-73-cleanup-rules-planning
      source_revision: 4163e8ad03d69253f064e964d422ea69bedf35b2

  seeder:
    needs: rules
    uses: ./.github/workflows/contract-apply-role.yml
    secrets: inherit
    with:
      stage: cleanup
      role: seeder
      planning_run_id: "PENDING"
      artifact_name: issue-73-cleanup-seeder-planning
      source_revision: 4163e8ad03d69253f064e964d422ea69bedf35b2
